# Minimal, clean prompt.
# Single line: path, git branch + status, then the prompt character.
add_newline = false

format = "$directory$git_branch$git_status$character"

[directory]
style = "cyan"
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = ""
format = "[$branch]($style) "
style = "purple"

[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style))'
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "●"
staged = "+"
renamed = "»"
deleted = "✘"

[character]
success_symbol = "[%](green)"
error_symbol = "[%](red)"
vicmd_symbol = "[%](yellow)"
