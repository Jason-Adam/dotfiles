# ──────────────────────────────────────────────────────────────────────
#  Visual Settings
# ──────────────────────────────────────────────────────────────────────
set -g default-command ${SHELL}

# Enable 256-color terminal.
set -g default-terminal tmux-256color


# Pane Borders
set -g pane-border-style bg=default,fg=colour238
set -g pane-active-border-style bg=default,fg=colour141
set -g pane-border-indicators colour

# Pane color palette:
#   1=red(196) 2=green(46) 3=yellow(226) 4=blue(33) 5=magenta(201) 6=cyan(51) *=purple(141)
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#{?#{==:#{pane_index},1},#[fg=colour196],#{?#{==:#{pane_index},2},#[fg=colour46],#{?#{==:#{pane_index},3},#[fg=colour226],#{?#{==:#{pane_index},4},#[fg=colour33],#{?#{==:#{pane_index},5},#[fg=colour201],#{?#{==:#{pane_index},6},#[fg=colour51],#[fg=colour141]}}}}}}── #{pane_title} ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────,#[fg=colour238]── #{?#{==:#{pane_index},1},#[fg=colour196],#{?#{==:#{pane_index},2},#[fg=colour46],#{?#{==:#{pane_index},3},#[fg=colour226],#{?#{==:#{pane_index},4},#[fg=colour33],#{?#{==:#{pane_index},5},#[fg=colour201],#{?#{==:#{pane_index},6},#[fg=colour51],#[fg=colour141]}}}}}}#{pane_title}#[fg=colour238] ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────}"

# Dynamic active border color — matches the pane's title color
# Sets active border to pane's color; resets inactive borders to default
set-hook -g after-select-pane 'run-shell "case #{pane_index} in 1) C=196;; 2) C=46;; 3) C=226;; 4) C=33;; 5) C=201;; 6) C=51;; *) C=141;; esac; if [ #{window_panes} -le 2 ]; then BC=\$C; else BC=238; fi; tmux set -w pane-active-border-style fg=colour\$C; tmux set -w pane-border-style fg=colour\$BC; tmux refresh-client"'

# ──────────────────────────────────────────────────────────────────────
#  Status Bar
# ──────────────────────────────────────────────────────────────────────
set -g status-style fg=white,bg=black
set -g status-interval 1
set -g status-left-length 40
set -g status-justify centre
set -g status-left "#[fg=white]#H #[fg=black]• #[fg=white,bright]#(uname -r)#[default]"
set -g status-right-length 140
set -g status-right "#S #[fg=green,bg=black]#(tmux-mem-cpu-load --interval 2)#[default]"
set -ga status-right " #[fg=white,bg=default]%a%l:%M:%S %p#[default] #[fg=blue]%Y-%m-%d"

# ──────────────────────────────────────────────────────────────────────
#  General Settings
# ──────────────────────────────────────────────────────────────────────
# Mouse support.
set -g mouse on

# Start indexing at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# ──────────────────────────────────────────────────────────────────────
#  Vi Bindings
# ──────────────────────────────────────────────────────────────────────

setw -g mode-keys vi

# Don't wait any time after an `Esc` keypress is input to determine if
# it is part of a function or meta key sequences. This will make tmux
# play nicer with vim.
set -s escape-time 0

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# h, j, k, l
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# `Ctrl+[` to enter access the scrollback buffer in vi-mode.
# `v` to enter visual mode.
# `y` to yank selection.
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Resize panes
bind -r C-H resize-pane -L 10
bind -r C-J resize-pane -D 10
bind -r C-K resize-pane -U 10
bind -r C-L resize-pane -R 10

# Equalize pane sizes
bind = select-layout even-horizontal
bind + select-layout even-vertical

# ──────────────────────────────────────────────────────────────────────
#  Tmux Plugin Manager
# ──────────────────────────────────────────────────────────────────────
# Easy copying to the system clipboard.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize plugin manager.
# Keep this at the bottom of this file.
run '~/.tmux/plugins/tpm/tpm'
